apiVersion: v1
kind: Service
metadata:
  name: {{ include "shift-swap-service.fullname" . }}
  labels:
    {{- include "shift-swap-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "shift-swap-service.selectorLabels" . | nindent 4 }}
    color: {{ .Values.blueGreen.activeColor }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
